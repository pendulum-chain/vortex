# Netlify config for the dashboard site (e.g. dashboard.vortexfinance.co), served at
# the domain root.
#
# Requires the Netlify site's "Base directory" to be set to `apps/dashboard` so this
# file is picked up. The build runs from the repo root because the dashboard depends
# on the workspace packages (@vortexfi/shared must be built first).
#
# Required build-time environment variables (set in the Netlify UI):
#   VITE_API_URL                  – the API origin, e.g. https://api-staging.vortexfinance.co
#   VITE_WALLETCONNECT_PROJECT_ID – WalletConnect project id
#   VITE_WIDGET_URL               – the widget site's origin (production builds default to
#                                   https://app.vortexfinance.co; set explicitly everywhere
#                                   else — a wrong value burns invite one-time tokens)
#   VITE_ALCHEMY_API_KEY          – optional, for ephemeral EVM presigning
#
# The API's CORS whitelist must include this site's origin (DASHBOARD_ORIGINS env var on
# the backend), and the Monerium application must have
# https://<this-site>/monerium/callback registered as a redirect URI (matching the
# backend's MONERIUM_REDIRECT_URI).

[build]
  command = "cd ../.. && bun install --frozen-lockfile && bun run build:shared && bun run build:dashboard"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
