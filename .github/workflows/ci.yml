name: ci
on:
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Running ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18 ]
    env:
      CI: true

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v3

      - name: 🧩 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.1

      - name: 🧩 Install dependencies
        run: bun install --frozen-lockfile

      - name: Check versions
        run: |
          bun --version
          node --version
          bunx tsc -v
        
      - name: Build 
        run: bun run build

      - name: 🧪 Biome check
        run: bun run verify

      - name: ✏️ Typecheck
        run: bun run typecheck

  test:
    name: Running tests
    runs-on: ubuntu-latest
    env:
      CI: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vortex_test
        ports:
          - 54329:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v3

      - name: 🧩 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.1

      - name: 🧩 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build shared package
        run: bun run build:shared

      - name: 🧪 Shared tests (coverage-gated)
        run: cd packages/shared && bun run test:coverage

      - name: 🧪 SDK tests
        run: bun run test:sdk

      - name: 🧪 Rebalancer tests (coverage-gated)
        run: cd apps/rebalancer && bun run test:coverage

      - name: 🧪 API tests (unit + integration, coverage-gated)
        run: cd apps/api && bun run test:coverage

      - name: 🧪 Frontend tests (coverage-gated)
        run: cd apps/frontend && bun run test:coverage
